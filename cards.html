<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cards - SABAODY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pirata+One&display=swap" rel="stylesheet">
    <style>
        .pirate { font-family: 'Pirata One', cursive; }
        body { background: #0b0e1e; color: #e2e8f0; }
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .card { border-radius: 16px; padding: 12px; transition: transform 0.2s; }
        .card:hover { transform: scale(1.02); }
        .rarity-Common { border-left: 4px solid #9ca3af; }
        .rarity-Uncommon { border-left: 4px solid #22c55e; }
        .rarity-Rare { border-left: 4px solid #3b82f6; }
        .rarity-Super { border-left: 4px solid #a855f7; }
        .rarity-Ultra { border-left: 4px solid #ef4444; }
        .rarity-Legendary { border-left: 4px solid #f59e0b; }
        .rarity-Mythic { border-left: 4px solid #ec4899; }
    </style>
</head>
<body class="min-h-screen p-6">
    <nav class="glass rounded-2xl p-4 mb-8 flex justify-between items-center">
        <h1 class="text-3xl pirate gold-text">⚓ SABAODY</h1>
        <div class="space-x-4">
            <a href="profile.html" class="text-gray-300 hover:text-yellow-400">Profile</a>
            <a href="cards.html" class="text-yellow-400 font-semibold">Cards</a>
            <a href="store.html" class="text-gray-300 hover:text-yellow-400">Store</a>
            <a href="leaderboard.html" class="text-gray-300 hover:text-yellow-400">Leaderboard</a>
<a href="duels.html" class="text-gray-300 hover:text-yellow-400">Duels</a>
            <button onclick="logout()" class="bg-red-500 px-4 py-2 rounded-xl text-white">Logout</button>
        </div>
    </nav>

    <div class="glass rounded-2xl p-6">
        <h2 class="text-2xl pirate mb-6">📇 My Card Collection</h2>
        <div id="card-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4"></div>
    </div>
    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            if (!localStorage.getItem('sabaody_token')) window.location = 'index.html';
            await loadCards();
        });
    </script>
</body>
</html>
