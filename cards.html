<!DOCTYPE html>
<html>
<head><title>Cards</title><link rel="stylesheet" href="css/style.css"></head>
<body class="bg-gradient">
  <div id="navbar"></div>
  <div class="container">
    <h2 class="text-gold" style="font-family:'Pirata One';">Your Cards</h2>
    <div id="highTier" class="mb-4"></div>
    <div id="cardsGrid" class="grid grid-4"></div>
  </div>
  <script src="js/main.js"></script>
  <script>
    requireAuth();
    const user = getUser();
    fetch('/api/cards', { headers: { Authorization: `Bearer ${getToken()}` } })
      .then(r => r.json())
      .then(cards => {
        const highTier = cards.filter(c => ['t5','t6','tx'].includes(c.rarity));
        if (highTier.length) {
          let idx = 0;
          function showSlide() {
            const card = highTier[idx];
            document.getElementById('highTier').innerHTML = `
              <div class="glass p-4" style="text-align:center;">
                <img src="${card.image_url}" style="max-height:200px;">
                <h3>${card.card_name}</h3>
                <p class="text-gold">${card.rarity}</p>
              </div>
            `;
            idx = (idx + 1) % highTier.length;
          }
          showSlide();
          setInterval(showSlide, 3000);
        }
        const grid = document.getElementById('cardsGrid');
        grid.innerHTML = cards.map(card => `
          <div class="glass p-2">
            <img src="${card.image_url}" style="width:100%; height:150px; object-fit:contain;">
            <p class="text-sm">${card.card_name}</p>
            <p class="text-sm">⚔️${card.attack} 🛡️${card.defense}</p>
          </div>
        `).join('');
      });
  </script>
</body>
</html>
