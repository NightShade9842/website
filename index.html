<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚓ SABAODY Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pirata+One&display=swap" rel="stylesheet">
    <style>
        .pirate { font-family: 'Pirata One', cursive; }
        body { background: #0b0e1e; color: #e2e8f0; }
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .gold-text { background: linear-gradient(135deg, #fbbf24, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="glass rounded-3xl p-8 w-full max-w-md text-center">
        <h1 class="text-5xl pirate gold-text mb-2">⚓ SABAODY</h1>
        <p class="text-lg mb-8 text-gray-300">One Piece Trading Card Game</p>

        <div id="login-box">
            <p class="mb-4">Login with your WhatsApp number</p>
            <input type="text" id="phoneInput" placeholder="233540876191" class="w-full bg-gray-800 rounded-xl px-4 py-3 mb-4 text-white border border-gray-600 focus:outline-none focus:border-yellow-400">
            <button onclick="sendAuthCode()" class="w-full bg-yellow-500 hover:bg-yellow-400 text-black font-bold py-3 rounded-xl transition">Send Verification Code</button>
        </div>

        <div id="code-box" class="hidden mt-4">
            <p class="mb-4">Enter the code sent to your WhatsApp</p>
            <input type="text" id="codeInput" placeholder="123456" class="w-full bg-gray-800 rounded-xl px-4 py-3 mb-4 text-white border border-gray-600 focus:outline-none focus:border-yellow-400">
            <button onclick="verifyCode()" class="w-full bg-yellow-500 hover:bg-yellow-400 text-black font-bold py-3 rounded-xl transition">Verify & Enter</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
