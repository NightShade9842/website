<!DOCTYPE html>
<html>
<head>
  <title>SABAODY Pirates - Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gradient">
  <div class="container" style="max-width:400px; margin-top:10vh;">
    <h1 class="text-gold" style="font-family:'Pirata One'; text-align:center;">⚓ SABAODY PIRATES</h1>
    <div class="glass" style="padding:2rem;">
      <input type="text" id="pirateName" placeholder="Pirate Name" class="btn" style="width:100%; background:#fff1; color:#fff; margin-bottom:1rem;">
      <input type="text" id="whatsapp" placeholder="WhatsApp Number (e.g. 233560806367)" class="btn" style="width:100%; background:#fff1; color:#fff; margin-bottom:1rem;">
      <button onclick="login()" class="btn" style="width:100%;">Set Sail ⚓</button>
      <div id="output" style="margin-top:1rem; background:#111; padding:1rem; border-radius:5px; font-size:0.8rem; word-break:break-all; color:#0f0; max-height:200px; overflow:auto;"></div>
    </div>
  </div>
  <script>
    async function login() {
      const pirateName = document.getElementById('pirateName').value.trim();
      const whatsapp = document.getElementById('whatsapp').value.replace(/[+\s]/g, '');
      const output = document.getElementById('output');
      output.textContent = 'Sending request...';

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pirate_name: pirateName, whatsapp_number: whatsapp })
        });

        const data = await res.json();
        output.textContent = JSON.stringify(data, null, 2);

        if (data.token) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          output.textContent += '\n\nLogin successful! Redirecting...';
          setTimeout(() => { window.location.href = '/dashboard.html'; }, 1000);
        }
      } catch (err) {
        output.textContent = 'Error: ' + err.message;
      }
    }
  </script>
</body>
</html>
