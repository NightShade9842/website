<!DOCTYPE html>
<html>
<head><title>Dashboard</title><link rel="stylesheet" href="css/style.css"></head>
<body class="bg-gradient">
  <div id="navbar"></div>
  <div class="container">
    <h2 class="text-gold" style="font-family:'Pirata One'; font-size:2rem;">Ahoy, <span id="name"></span>!</h2>
    <div class="grid grid-2 mb-4">
      <div class="glass p-4">💰 Beli: <span id="beli"></span></div>
      <div class="glass p-4">💎 Gems: <span id="gems"></span></div>
      <div class="glass p-4">⭐ Level: <span id="level"></span></div>
      <div class="glass p-4">🪙 Gold Coins: <span id="coins"></span></div>
    </div>
    <div class="grid grid-2">
      <button class="glass p-4 text-gold" onclick="location='/profile.html'">Edit Profile</button>
      <button class="glass p-4 text-gold" onclick="location='/store.html'">Store</button>
      <button class="glass p-4 text-gold" onclick="location='/guild.html'">Guild</button>
      <button class="glass p-4 text-gold" onclick="location='/cards.html'">Cards</button>
    </div>
  </div>
  <script src="js/main.js"></script>
  <script>
    requireAuth();
    const user = getUser();
    document.getElementById('name').textContent = user.pirate_name;
    document.getElementById('beli').textContent = user.beli.toLocaleString() + '฿';
    document.getElementById('gems').textContent = user.gems;
    document.getElementById('level').textContent = user.level;
    document.getElementById('coins').textContent = user.gold_coins;
  </script>
</body>
</html>
