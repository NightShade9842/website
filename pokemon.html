<!DOCTYPE html>
<html>
<head><title>Pokémon</title><link rel="stylesheet" href="css/style.css"></head>
<body class="bg-gradient">
  <div id="navbar"></div>
  <div class="container">
    <h2 class="text-gold" style="font-family:'Pirata One';">Your Pokémon</h2>
    <div id="pokemonGrid" class="grid grid-4"></div>
  </div>
  <script src="js/main.js"></script>
  <script>
    requireAuth();
    fetch('/api/pokemon', { headers: { Authorization: `Bearer ${getToken()}` } })
      .then(r => r.json())
      .then(pokemon => {
        document.getElementById('pokemonGrid').innerHTML = pokemon.map(p => `
          <div class="glass p-2">
            <img src="${p.image_url || '/placeholder.png'}" style="width:100%; height:120px; object-fit:contain;">
            <p>${p.pokemon_name} ${p.shiny ? '✨' : ''}</p>
            <p class="text-sm">Lv.${p.level} | HP: ${p.hp}/${p.max_hp}</p>
          </div>
        `).join('');
      });
  </script>
</body>
</html>
