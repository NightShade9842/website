<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>⚓ SABAODY RPG</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; touch-action: none; }
        canvas { display: block; position: absolute; top: 0; left: 0; }

        /* UI overlay */
        #ui {
            position: absolute; top: 10px; left: 10px;
            color: white; font-family: 'Arial', sans-serif;
            z-index: 10; pointer-events: none;
            text-shadow: 1px 1px 2px black;
        }
        #ui p { margin: 2px 0; }

        /* Virtual joystick area (left) */
        #joystick-zone {
            position: absolute; bottom: 30px; left: 30px;
            width: 140px; height: 140px;
            z-index: 20;
        }
        #joystick-base {
            width: 120px; height: 120px;
            border-radius: 50%;
            background: rgba(255,255,255,0.15);
            border: 2px solid rgba(255,255,255,0.3);
            position: relative;
            margin: 10px;
        }
        #joystick-thumb {
            width: 50px; height: 50px;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            position: absolute;
            top: 35px; left: 35px;
            transition: background 0.1s;
        }

        /* Action buttons (right side) */
        #action-buttons {
            position: absolute; bottom: 30px; right: 30px;
            display: flex; flex-direction: column; gap: 10px;
            z-index: 20;
        }
        .action-btn {
            width: 50px; height: 50px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.4);
            color: white;
            font-size: 20px;
            display: flex; align-items: center; justify-content: center;
            user-select: none;
            -webkit-user-select: none;
        }
        .action-btn:active { background: rgba(255,255,255,0.5); }

        /* Landscape warning (hidden by default) */
        #rotate-warning {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            color: white;
            z-index: 100;
            justify-content: center; align-items: center;
            font-family: Arial;
            font-size: 24px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="rotate-warning">🔄 Please rotate your device to landscape mode</div>

    <div id="ui">
        <p id="playerName">🏴‍☠️ Loading...</p>
        <p id="playerHP">❤️ 100</p>
        <p id="playerBeli">💰 0</p>
    </div>

    <!-- Mobile controls (hidden on desktop via CSS media query if desired, but we'll handle in JS) -->
    <div id="joystick-zone">
        <div id="joystick-base">
            <div id="joystick-thumb"></div>
        </div>
    </div>
    <div id="action-buttons">
        <div class="action-btn" id="btn-attack">⚔️</div>
        <div class="action-btn" id="btn-jump">⬆️</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module" src="game.js"></script>
</body>
</html>
