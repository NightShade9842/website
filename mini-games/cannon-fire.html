<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cannon Fire</title>
    <style>
        body { margin: 0; background: #0b0e1e; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { border: 2px solid #f59e0b; border-radius: 12px; }
    </style>
</head>
<body>
    <canvas id="game" width="400" height="400"></canvas>
    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        
        let targetX = Math.random() * 300 + 50;
        let targetY = Math.random() * 200 + 50;
        let score = 0;
        let timeLeft = 10;
        let gameOver = false;
        
        canvas.addEventListener('click', (e) => {
            if (gameOver) return;
            const rect = canvas.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const clickY = e.clientY - rect.top;
            
            const distance = Math.sqrt((clickX - targetX) ** 2 + (clickY - targetY) ** 2);
            if (distance < 30) {
                score += 100;
                targetX = Math.random() * 300 + 50;
                targetY = Math.random() * 200 + 50;
            }
        });
        
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#f59e0b';
            ctx.beginPath();
            ctx.arc(targetX, targetY, 25, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = 'white';
            ctx.font = '20px Arial';
            ctx.fillText(`Score: ${score}`, 10, 30);
            ctx.fillText(`Time: ${timeLeft}`, 300, 30);
        }
        
        const interval = setInterval(() => {
            if (gameOver) return;
            timeLeft--;
            draw();
            if (timeLeft <= 0) {
                gameOver = true;
                window.parent.postMessage({ game: 'cannon_fire', score }, '*');
                clearInterval(interval);
            }
        }, 1000);
        
        draw();
    </script>
</body>
</html>
