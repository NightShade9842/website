<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store - SABAODY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pirata+One&display=swap" rel="stylesheet">
    <style>
        .pirate { font-family: 'Pirata One', cursive; }
        body { background: #0b0e1e; color: #e2e8f0; }
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .tab-btn { padding: 0.5rem 1rem; border-radius: 0.5rem; cursor: pointer; }
        .tab-active { background: #f59e0b; color: black; font-weight: bold; }
    </style>
</head>
<body class="min-h-screen p-6">
    <nav class="glass rounded-2xl p-4 mb-8 flex justify-between items-center">
        <h1 class="text-3xl pirate gold-text">⚓ SABAODY</h1>
        <div class="space-x-4">
            <a href="profile.html" class="text-gray-300 hover:text-yellow-400">Profile</a>
            <a href="cards.html" class="text-gray-300 hover:text-yellow-400">Cards</a>
            <a href="store.html" class="text-yellow-400 font-semibold">Store</a>
            <a href="leaderboard.html" class="text-gray-300 hover:text-yellow-400">Leaderboard</a>
            <button onclick="logout()" class="bg-red-500 px-4 py-2 rounded-xl text-white">Logout</button>
        </div>
    </nav>

    <div class="glass rounded-2xl p-6">
        <div class="flex space-x-4 mb-6 overflow-x-auto">
            <button onclick="switchTab('cards')" class="tab-btn tab-active" id="tab-cards">🃏 Card Shop</button>
            <button onclick="switchTab('auctions')" class="tab-btn" id="tab-auctions">🔨 Auctions</button>
            <button onclick="switchTab('events')" class="tab-btn" id="tab-events">🎪 Event Store</button>
            <button onclick="switchTab('items')" class="tab-btn" id="tab-items">🎁 Item Store</button>
        </div>

        <div id="tab-content" class="min-h-[400px]"></div>
    </div>

    <script src="app.js"></script>
    <script>
        let currentTab = 'cards';
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active'));
            document.getElementById('tab-' + tab).classList.add('tab-active');
            loadTabContent();
        }
        async function loadTabContent() {
            const container = document.getElementById('tab-content');
            switch(currentTab) {
                case 'cards': await loadCardShop(container); break;
                case 'auctions': await loadAuctions(container); break;
                case 'events': await loadEventStore(container); break;
                case 'items': await loadItemStore(container); break;
            }
        }
        document.addEventListener('DOMContentLoaded', () => {
            if (!localStorage.getItem('sabaody_token')) window.location = 'index.html';
            loadTabContent();
        });
    </script>
</body>
</html>
