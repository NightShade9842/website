<!DOCTYPE html>
<html>
<head><title>Store</title><link rel="stylesheet" href="css/style.css"></head>
<body class="bg-gradient">
  <div id="navbar"></div>
  <div class="container">
    <h2 class="text-gold" style="font-family:'Pirata One';">Store</h2>
    <div id="storeItems" class="grid grid-2"></div>
    <p id="message" class="text-sm"></p>
  </div>
  <script src="js/main.js"></script>
  <script>
    requireAuth();
    async function loadStore() {
      const items = await apiFetch('/store');
      const container = document.getElementById('storeItems');
      container.innerHTML = items.map(item => `
        <div class="glass p-4">
          <h3>${item.name}</h3>
          <p class="text-sm">${item.description}</p>
          <p>${item.price_gems ? item.price_gems+' 💎' : ''} ${item.price_beli ? item.price_beli.toLocaleString()+'฿' : ''}</p>
          <button class="btn" onclick="buy(${item.id})">Buy</button>
        </div>
      `).join('');
    }
    loadStore();

    async function buy(itemId) {
      const res = await apiFetch('/store', {
        method: 'POST',
        body: JSON.stringify({ itemId })
      });
      document.getElementById('message').textContent = res.message || res.error;
    }
  </script>
</body>
</html>
