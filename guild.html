<!DOCTYPE html>
<html>
<head><title>Guild</title><link rel="stylesheet" href="css/style.css"></head>
<body class="bg-gradient">
  <div id="navbar"></div>
  <div class="container">
    <h2 class="text-gold" style="font-family:'Pirata One';">Your Guild</h2>
    <div id="guildInfo"></div>
  </div>
  <script src="js/main.js"></script>
  <script>
    requireAuth();
    const user = getUser();
    if (user.guild_id) {
      fetch(`/api/guild?guild_id=${user.guild_id}`)
        .then(r => r.json())
        .then(data => {
          if (!data.guild) {
            document.getElementById('guildInfo').innerHTML = '<p>You are not in a guild.</p>';
            return;
          }
          const { guild, members } = data;
          document.getElementById('guildInfo').innerHTML = `
            <h3>${guild.name}</h3>
            <p>${guild.description || ''}</p>
            <p class="text-gold">Treasury: ${guild.treasury.toLocaleString()}฿</p>
            <h4 class="mt-2">Members</h4>
            <div class="grid grid-2">
              ${members.map(m => `<div class="glass p-3">${m.pirate_name} <span class="text-sm">(${m.guild_role})</span></div>`).join('')}
            </div>
          `;
        });
    } else {
      document.getElementById('guildInfo').innerHTML = '<p>You are not in a guild.</p>';
    }
  </script>
</body>
</html>
