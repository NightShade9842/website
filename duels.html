<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Duels - SABAODY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pirata+One&display=swap" rel="stylesheet">
    <style>
        .pirate { font-family: 'Pirata One', cursive; }
        body { background: #0b0e1e; color: #e2e8f0; }
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .gold-text { background: linear-gradient(135deg, #fbbf24, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .tab-btn { padding: 0.5rem 1rem; border-radius: 0.5rem; cursor: pointer; transition: all 0.2s; }
        .tab-active { background: #f59e0b; color: black; font-weight: bold; }
        .card-slot { width: 90px; height: 120px; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; position: relative; transition: all 0.2s; }
        .card-slot.player-card { border: 2px solid #22c55e; background: linear-gradient(180deg, #1a3a5c, #0f2b45); }
        .card-slot.opponent-card { border: 2px solid #ef4444; background: linear-gradient(180deg, #3a1a1a, #2b0f0f); }
        .card-slot.face-down { border: 2px solid #f59e0b; background: #2d1b4e; }
        .card-slot.empty { border: 2px dashed #334155; background: transparent; }
        .card-slot.hand-card { border: 2px solid #f59e0b; background: linear-gradient(180deg, #1a3a5c, #0f2b45); cursor: pointer; }
        .card-slot.hand-card:hover { border-color: #fff; transform: translateY(-4px); }
        .hp-bar { height: 16px; border-radius: 8px; transition: width 0.5s ease; }
        .btn { padding: 0.5rem 1rem; border-radius: 0.5rem; font-weight: bold; cursor: pointer; transition: all 0.2s; border: none; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-gold { background: #f59e0b; color: black; }
        .btn-gold:hover:not(:disabled) { background: #fbbf24; transform: translateY(-1px); }
        .btn-blue { background: #3b82f6; color: white; }
        .btn-blue:hover:not(:disabled) { background: #60a5fa; transform: translateY(-1px); }
        .btn-red { background: #ef4444; color: white; }
        .btn-red:hover:not(:disabled) { background: #f87171; transform: translateY(-1px); }
        .btn-green { background: #22c55e; color: black; }
        .btn-green:hover:not(:disabled) { background: #4ade80; transform: translateY(-1px); }
        .btn-purple { background: #8b5cf6; color: white; }
        .btn-purple:hover:not(:disabled) { background: #a78bfa; transform: translateY(-1px); }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .pulse { animation: pulse 1.5s infinite; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-3px); } 75% { transform: translateX(3px); } }
        .shake { animation: shake 0.3s; }
    </style>
</head>
<body class="min-h-screen p-6">
    <!-- Navigation -->
    <nav class="glass rounded-2xl p-4 mb-8 flex justify-between items-center flex-wrap gap-2">
        <h1 class="text-3xl pirate gold-text">⚓ SABAODY</h1>
        <div class="space-x-2 md:space-x-4">
            <a href="profile.html" class="text-gray-300 hover:text-yellow-400 transition">Profile</a>
            <a href="cards.html" class="text-gray-300 hover:text-yellow-400 transition">Cards</a>
            <a href="store.html" class="text-gray-300 hover:text-yellow-400 transition">Store</a>
            <a href="duels.html" class="text-yellow-400 font-semibold">Duels</a>
            <a href="leaderboard.html" class="text-gray-300 hover:text-yellow-400 transition">Leaderboard</a>
            <button onclick="logout()" class="bg-red-500 px-4 py-2 rounded-xl text-white hover:bg-red-600 transition">Logout</button>
        </div>
    </nav>

    <!-- Main Content -->
    <div id="duel-content" class="glass rounded-2xl p-6 min-h-[500px]">
        <div class="flex items-center justify-center h-64">
            <div class="text-center">
                <div class="spinner mb-4"></div>
                <p class="text-gray-400">Loading duel arena...</p>
            </div>
        </div>
    </div>

    <!-- Loading Spinner Style -->
    <style>
        .spinner { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid #f59e0b; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>

    <script src="app.js"></script>
    <script>
        let duelPollInterval = null;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            if (!localStorage.getItem('sabaody_token')) window.location = 'index.html';
            loadDuelPage();
        });

        // Cleanup on leave
        window.addEventListener('beforeunload', () => {
            if (duelPollInterval) clearInterval(duelPollInterval);
        });

        async function loadDuelPage() {
            const data = await apiFetch('/duel/active');
            if (data?.active) {
                if (duelPollInterval) clearInterval(duelPollInterval);
                duelPollInterval = setInterval(pollDuel, 3000);
                renderBattlefield(data.duel);
            } else {
                if (duelPollInterval) clearInterval(duelPollInterval);
                loadLobby();
            }
        }

        // ═══════════════════════════════════
        // LOBBY
        // ═══════════════════════════════════
        async function loadLobby() {
            const container = document.getElementById('duel-content');
            const [pending, players, stats] = await Promise.all([
                apiFetch('/duel/pending'),
                apiFetch('/duel/players'),
                apiFetch('/duel/stats')
            ]);

            let html = '<div class="grid grid-cols-1 md:grid-cols-3 gap-6">';

            // Stats Card
            html += `<div class="glass rounded-xl p-5">
                <h3 class="text-2xl pirate mb-4">📊 Your Duel Stats</h3>
                <div class="space-y-3">
                    <div class="flex justify-between"><span>⚔️ Total Duels</span><span class="font-bold">${stats?.total || 0}</span></div>
                    <div class="flex justify-between"><span>🏆 Wins</span><span class="text-green-400 font-bold">${stats?.wins || 0}</span></div>
                    <div class="flex justify-between"><span>💀 Losses</span><span class="text-red-400 font-bold">${stats?.losses || 0}</span></div>
                    <div class="flex justify-between"><span>📈 Win Rate</span><span class="font-bold">${stats?.total ? Math.round((stats.wins / stats.total) * 100) : 0}%</span></div>
                </div>
            </div>`;

            // Pending Challenges
            html += `<div class="glass rounded-xl p-5">
                <h3 class="text-2xl pirate mb-4">📨 Challenges</h3>`;
            if (pending?.length) {
                pending.forEach(d => {
                    html += `<div class="flex justify-between items-center bg-gray-800 rounded-lg p-3 mb-2">
                        <div><p class="font-bold">${d.challenger_name}</p><p class="text-xs text-gray-400">Wants to duel!</p></div>
                        <div class="space-x-2">
                            <button onclick="acceptDuel()" class="bg-green-500 text-black px-3 py-1 rounded text-sm font-bold hover:bg-green-400">✓ Accept</button>
                            <button onclick="declineDuel()" class="bg-red-500 text-white px-3 py-1 rounded text-sm font-bold hover:bg-red-400">✗ Decline</button>
                        </div>
                    </div>`;
                });
            } else {
                html += '<p class="text-gray-400 text-center py-4">No pending challenges</p>';
            }
            html += '</div>';

            // Challenge Players
            html += `<div class="glass rounded-xl p-5">
                <h3 class="text-2xl pirate mb-4">🏴‍☠️ Challenge</h3>
                <p class="text-sm text-gray-400 mb-3">Players with Deck 1 ready</p>
                <div class="space-y-2 max-h-64 overflow-y-auto">`;
            if (players?.length) {
                players.forEach(p => {
                    html += `<div class="flex justify-between items-center bg-gray-800 rounded-lg p-3">
                        <div><p class="font-bold">${p.pirate_name}</p><p class="text-xs text-gray-400">Lv.${p.level}</p></div>
                        <button onclick="challengePlayer('${p.user_id}')" class="bg-yellow-500 text-black px-4 py-1 rounded text-sm font-bold hover:bg-yellow-400">⚔️ Duel</button>
                    </div>`;
                });
            } else {
                html += '<p class="text-gray-400 text-center py-4">No players available</p>';
            }
            html += '</div></div>';

            container.innerHTML = html;
        }

        async function challengePlayer(opponentId) {
            const res = await apiFetch('/duel/challenge', { method: 'POST', body: JSON.stringify({ opponentId }) });
            if (res?.success) {
                alert('⚔️ Challenge sent! Waiting for opponent...');
                loadDuelPage();
            } else {
                alert(res?.error || 'Failed to challenge');
            }
        }

        async function acceptDuel() {
            const res = await apiFetch('/duel/accept', { method: 'POST' });
            if (res?.success) {
                loadDuelPage();
            } else {
                alert(res?.error || 'Failed');
            }
        }

        async function declineDuel() {
            await apiFetch('/duel/decline', { method: 'POST' });
            loadLobby();
        }

        // ═══════════════════════════════════
        // BATTLEFIELD
        // ═══════════════════════════════════
        async function pollDuel() {
            const data = await apiFetch('/duel/active');
            if (!data?.active) {
                clearInterval(duelPollInterval);
                alert('🏁 Duel ended!');
                loadDuelPage();
                return;
            }
            renderBattlefield(data.duel);
        }

        function renderBattlefield(duel) {
            const container = document.getElementById('duel-content');
            if (!container) return;

            const hpPercent = (hp) => Math.max(0, Math.min(100, (hp / 4000) * 100));
            const hpColor = (hp) => hp < 1000 ? 'bg-red-500' : 'bg-green-500';

            let html = `
            <!-- Header -->
            <div class="text-center mb-6">
                <div class="flex justify-center items-center gap-4 mb-2">
                    <span class="text-sm text-gray-400">Turn ${duel.turnCount}</span>
                    <span class="text-xs bg-gray-700 px-3 py-1 rounded-full">Phase: ${duel.phase.toUpperCase()}</span>
                    <span class="text-sm text-gray-400">🃏 ${duel.playerDeckCount} | 💀 ${duel.playerGrave}</span>
                </div>
                ${duel.isMyTurn ? '<p class="text-green-400 font-bold text-lg pulse">▶ YOUR TURN</p>' : '<p class="text-yellow-400">⏳ Waiting for opponent...</p>'}
            </div>

            <!-- Opponent Field -->
            <div class="mb-6">
                <div class="flex justify-between items-center mb-2">
                    <p class="font-bold text-lg">👤 ${duel.opponent}</p>
                    <p class="font-bold">❤️ ${duel.opponentHP} / 4000</p>
                </div>
                <div class="h-4 bg-gray-700 rounded-full mb-4 overflow-hidden">
                    <div class="h-full rounded-full transition-all duration-500 ${hpColor(duel.opponentHP)}" style="width:${hpPercent(duel.opponentHP)}%"></div>
                </div>
                <div class="flex gap-3 justify-center flex-wrap">`;
            
            for (let i = 0; i < 5; i++) {
                const c = duel.opponentField?.[i];
                if (c) {
                    if (c.faceDown) {
                        html += `<div class="card-slot face-down"><span class="text-3xl">🂠</span><span class="text-xs text-gray-400 mt-1">Face Down</span></div>`;
                    } else {
                        html += `<div class="card-slot opponent-card">
                            <span class="font-bold text-xs truncate w-full text-center">${c.name?.substring(0,10)}</span>
                            <span class="text-yellow-400 text-xs">⚔️${c.attack}</span>
                            <span class="text-blue-400 text-xs">🛡️${c.defense}</span>
                            <span class="text-xs mt-1 ${c.position==='atk'?'text-red-400':'text-green-400'}">${c.position?.toUpperCase()}</span>
                        </div>`;
                    }
                } else {
                    html += `<div class="card-slot empty"><span class="text-gray-600 text-xs">Slot ${i+1}</span></div>`;
                }
            }
            html += `</div></div>

            <!-- Battle Zone -->
            <div class="text-center py-4 border-y border-gray-700 my-6">
                <p class="text-yellow-400 text-xl pirate">⚔️ BATTLEFIELD ⚔️</p>
                ${duel.lastAction ? `<p class="text-sm text-gray-300 mt-2 bg-gray-800 rounded-lg px-4 py-2 inline-block animate-pulse">${duel.lastAction}</p>` : ''}
            </div>

            <!-- Player Field -->
            <div class="mb-6">
                <div class="flex gap-3 justify-center flex-wrap mb-4">`;
            
            for (let i = 0; i < 5; i++) {
                const c = duel.playerField?.[i];
                if (c) {
                    if (c.faceDown) {
                        html += `<div class="card-slot face-down"><span class="text-3xl">🂠</span><span class="text-xs text-gray-400 mt-1">Face Down</span></div>`;
                    } else {
                        html += `<div class="card-slot player-card">
                            <span class="font-bold text-xs truncate w-full text-center">${c.name?.substring(0,10)}</span>
                            <span class="text-yellow-400 text-xs">⚔️${c.attack}</span>
                            <span class="text-blue-400 text-xs">🛡️${c.defense}</span>
                            <span class="text-xs mt-1 ${c.position==='atk'?'text-red-400':'text-green-400'}">${c.position?.toUpperCase()}</span>
                            <span class="absolute -top-2 -right-2 bg-yellow-500 text-black rounded-full w-5 h-5 flex items-center justify-center text-xs font-bold">${i+1}</span>
                        </div>`;
                    }
                } else {
                    html += `<div class="card-slot empty"><span class="text-gray-600 text-xs">Slot ${i+1}</span></div>`;
                }
            }
            html += `</div>
                <div class="flex justify-between items-center mb-2">
                    <p class="font-bold text-lg">👤 You</p>
                    <p class="font-bold">❤️ ${duel.playerHP} / 4000</p>
                </div>
                <div class="h-4 bg-gray-700 rounded-full overflow-hidden">
                    <div class="h-full rounded-full transition-all duration-500 ${hpColor(duel.playerHP)}" style="width:${hpPercent(duel.playerHP)}%"></div>
                </div>
            </div>

            <!-- Hand -->
            <div class="mb-6">
                <p class="text-sm text-gray-400 mb-3">🃏 Your Hand (${duel.playerHand?.length||0} cards)</p>
                <div class="flex gap-2 flex-wrap justify-center">`;
            
            if (duel.playerHand?.length) {
                duel.playerHand.forEach((c, i) => {
                    html += `<div class="card-slot hand-card">
                        <span class="text-xs text-gray-400">#${i+1}</span>
                        <span class="font-bold text-xs truncate w-full text-center">${c.name?.substring(0,10)}</span>
                        <span class="text-yellow-400 text-xs">⚔️${c.attack}</span>
                        <span class="text-blue-400 text-xs">🛡️${c.defense}</span>
                    </div>`;
                });
            } else {
                html += '<p class="text-gray-500 text-sm">No cards in hand</p>';
            }
            html += `</div></div>`;

            // Controls
            if (duel.isMyTurn) {
                html += `<div class="flex gap-3 justify-center flex-wrap mt-6 pt-4 border-t border-gray-700">`;
                if (duel.phase === 'draw') {
                    html += `<button onclick="duelAction('draw')" class="btn btn-blue">📥 Draw Card</button>`;
                }
                html += `<button onclick="duelAction('summon')" class="btn btn-gold">⚔️ Summon</button>
                    <button onclick="duelAction('attack')" class="btn btn-red">💥 Attack</button>
                    <button onclick="duelAction('set')" class="btn btn-purple">🛡️ Set Face-Down</button>
                    <button onclick="duelAction('endturn')" class="btn btn-green">🏁 End Turn</button>
                </div>`;
            }
            
            html += `<div class="text-center mt-6">
                <button onclick="duelAction('surrender')" class="bg-gray-700 hover:bg-red-700 text-white px-4 py-2 rounded-lg text-sm transition">🏳️ Surrender</button>
            </div>`;

            container.innerHTML = html;
        }

        // ═══════════════════════════════════
        // ACTIONS
        // ═══════════════════════════════════
        async function duelAction(action) {
            let body = {};
            
            if (action === 'summon') {
                const slot = prompt('Which hand slot? (1-' + (duel.playerHand?.length || 7) + '):');
                if (!slot) return;
                const pos = prompt('Position? (atk / def):', 'atk');
                if (!pos || !['atk', 'def'].includes(pos.toLowerCase())) return alert('Invalid position. Use atk or def.');
                body = { handSlot: parseInt(slot) - 1, position: pos.toLowerCase() };
            } else if (action === 'attack') {
                const slot = prompt('Which of YOUR monsters attacks? (field slot 1-5):');
                if (!slot) return;
                const target = prompt('Target opponent slot? (1-5, or leave blank for direct attack):');
                body = { fieldSlot: parseInt(slot) - 1 };
                if (target) body.targetSlot = parseInt(target) - 1;
            } else if (action === 'set') {
                const slot = prompt('Which hand slot to set face-down? (1-' + (duel.playerHand?.length || 7) + '):');
                if (!slot) return;
                body = { handSlot: parseInt(slot) - 1 };
            }

            const endpoints = {
                draw: '/duel/draw',
                summon: '/duel/summon',
                attack: '/duel/attack',
                set: '/duel/set',
                endturn: '/duel/endturn',
                surrender: '/duel/surrender'
            };

            const res = await apiFetch(endpoints[action], { method: 'POST', body: JSON.stringify(body) });

            if (res?.success) {
                if (res.result?.gameOver) {
                    alert('🏆 VICTORY! You won the duel!\n\n+1000฿ +50 XP');
                }
                await pollDuel();
            } else if (res?.error) {
                alert('❌ ' + res.error);
            }
        }
    </script>
</body>
</html>
