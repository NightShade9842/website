<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Duels - SABAODY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pirata+One&display=swap" rel="stylesheet">
    <style>
        .pirate { font-family: 'Pirata One', cursive; }
        body { background: #0b0e1e; color: #e2e8f0; }
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .gold-text { background: linear-gradient(135deg, #fbbf24, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .tab-btn { padding: 0.5rem 1rem; border-radius: 0.5rem; cursor: pointer; }
        .tab-active { background: #f59e0b; color: black; font-weight: bold; }
        .card-slot { width: 80px; height: 110px; border: 2px solid #334155; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 12px; position: relative; }
        .card-slot.occupied { border-color: #f59e0b; background: #1a3a5c; }
        .hp-bar { height: 20px; background: #22c55e; border-radius: 10px; transition: width 0.5s; }
        .hp-bar.low { background: #ef4444; }
        .btn { padding: 0.5rem 1rem; border-radius: 0.5rem; font-weight: bold; cursor: pointer; transition: all 0.2s; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-gold { background: #f59e0b; color: black; }
        .btn-gold:hover:not(:disabled) { background: #fbbf24; }
        .btn-blue { background: #3b82f6; color: white; }
        .btn-blue:hover:not(:disabled) { background: #60a5fa; }
        .btn-red { background: #ef4444; color: white; }
        .btn-red:hover:not(:disabled) { background: #f87171; }
        .btn-green { background: #22c55e; color: black; }
        .btn-green:hover:not(:disabled) { background: #4ade80; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .pulse { animation: pulse 1.5s infinite; }
    </style>
</head>
<body class="min-h-screen p-6">
    <nav class="glass rounded-2xl p-4 mb-8 flex justify-between items-center">
        <h1 class="text-3xl pirate gold-text">⚓ SABAODY</h1>
        <div class="space-x-4">
            <a href="profile.html" class="text-gray-300 hover:text-yellow-400">Profile</a>
            <a href="cards.html" class="text-gray-300 hover:text-yellow-400">Cards</a>
            <a href="store.html" class="text-gray-300 hover:text-yellow-400">Store</a>
            <a href="duels.html" class="text-yellow-400 font-semibold">Duels</a>
            <a href="leaderboard.html" class="text-gray-300 hover:text-yellow-400">Leaderboard</a>
            <button onclick="logout()" class="bg-red-500 px-4 py-2 rounded-xl text-white">Logout</button>
        </div>
    </nav>

    <div id="duel-content" class="glass rounded-2xl p-6">
        <p class="text-center py-8">Loading...</p>
    </div>

    <script src="app.js"></script>
    <script>
        let duelPollInterval = null;
        let currentView = 'lobby';

        document.addEventListener('DOMContentLoaded', () => {
            if (!localStorage.getItem('sabaody_token')) window.location = 'index.html';
            loadDuelPage();
        });

        async function loadDuelPage() {
            // Check for active duel first
            const data = await apiFetch('/duel/active');
            if (data?.active) {
                currentView = 'battle';
                renderBattlefield(data.duel);
                if (duelPollInterval) clearInterval(duelPollInterval);
                duelPollInterval = setInterval(pollDuel, 3000);
            } else {
                currentView = 'lobby';
                loadLobby();
            }
        }

        async function loadLobby() {
            const container = document.getElementById('duel-content');
            const [pending, players, stats] = await Promise.all([
                apiFetch('/duel/pending'),
                apiFetch('/duel/players'),
                apiFetch('/duel/stats')
            ]);

            let html = '<div class="grid grid-cols-1 md:grid-cols-3 gap-6">';

            // Stats
            html += `<div class="glass rounded-xl p-4"><h3 class="text-xl pirate mb-3">📊 Your Stats</h3>
                <p>⚔️ Total: ${stats?.total||0}</p><p>🏆 Wins: ${stats?.wins||0}</p><p>💀 Losses: ${stats?.losses||0}</p></div>`;

            // Pending challenges
            html += `<div class="glass rounded-xl p-4"><h3 class="text-xl pirate mb-3">📨 Challenges</h3>`;
            if (pending?.length) {
                pending.forEach(d => {
                    html += `<div class="flex justify-between items-center mb-2"><p>${d.challenger_name}</p>
                        <div><button onclick="acceptDuel()" class="btn btn-green text-sm px-3 py-1">Accept</button>
                        <button onclick="declineDuel()" class="btn btn-red text-sm px-3 py-1 ml-2">Decline</button></div></div>`;
                });
            } else { html += '<p class="text-gray-400">No pending challenges</p>'; }
            html += '</div>';

            // Online players
            html += `<div class="glass rounded-xl p-4"><h3 class="text-xl pirate mb-3">🏴‍☠️ Challenge Player</h3>`;
            if (players?.length) {
                players.forEach(p => {
                    html += `<div class="flex justify-between items-center mb-2"><p>${p.pirate_name} (Lv.${p.level})</p>
                        <button onclick="challengePlayer('${p.user_id}')" class="btn btn-gold text-sm px-3 py-1">⚔️ Duel</button></div>`;
                });
            } else { html += '<p class="text-gray-400">No players available</p>'; }
            html += '</div></div>';

            container.innerHTML = html;
        }

        async function challengePlayer(opponentId) {
            const res = await apiFetch('/duel/challenge', { method: 'POST', body: JSON.stringify({ opponentId }) });
            if (res?.success) {
                alert('Challenge sent! Waiting for opponent to accept...');
                loadDuelPage();
            } else {
                alert(res?.error || 'Failed to challenge');
            }
        }

        async function acceptDuel() {
            const res = await apiFetch('/duel/accept', { method: 'POST' });
            if (res?.success) { alert('Duel accepted!'); loadDuelPage(); }
        }

        async function declineDuel() {
            const res = await apiFetch('/duel/decline', { method: 'POST' });
            if (res?.success) { loadLobby(); }
        }

        async function pollDuel() {
            const data = await apiFetch('/duel/active');
            if (!data?.active) {
                clearInterval(duelPollInterval);
                alert('Duel ended!');
                loadDuelPage();
                return;
            }
            renderBattlefield(data.duel);
        }

        function renderBattlefield(duel) {
            const container = document.getElementById('duel-content');
            const hpBarWidth = (hp) => Math.max(0, (hp / 4000) * 100);
            const hpColor = (hp) => hp < 1000 ? 'low' : '';

            let html = `
            <div class="text-center mb-4">
                <p class="text-sm text-gray-400">Turn ${duel.turnCount} | ${duel.isMyTurn ? '<span class="text-green-400 pulse">▶ YOUR TURN</span>' : '<span class="text-yellow-400">⏳ Opponent\'s Turn</span>'}</p>
                <p class="text-xs text-gray-500">Phase: ${duel.phase} | Deck: ${duel.playerDeckCount} | Grave: ${duel.playerGrave}</p>
            </div>

            <!-- Opponent -->
            <div class="mb-4">
                <div class="flex justify-between items-center mb-1"><p class="font-bold">👤 ${duel.opponent}</p><p class="text-sm">❤️ ${duel.opponentHP}</p></div>
                <div class="h-5 bg-gray-700 rounded-full"><div class="hp-bar ${hpColor(duel.opponentHP)}" style="width:${hpBarWidth(duel.opponentHP)}%"></div></div>
                <div class="flex gap-2 mt-2 justify-center">`;
            for (let i = 0; i < 5; i++) {
                const card = duel.opponentField[i];
                html += `<div class="card-slot ${card ? 'occupied' : ''}">${card ? (card.faceDown ? '🂠' : card.name?.substring(0,8)) : ''}</div>`;
            }
            html += `</div></div>

            <!-- Battle Zone -->
            <div class="text-center py-3 border-y border-gray-700 my-4">
                <p class="text-yellow-400">⚔️ BATTLEFIELD ⚔️</p>
                ${duel.lastAction ? `<p class="text-xs text-gray-400 mt-1">${duel.lastAction}</p>` : ''}
            </div>

            <!-- Player -->
            <div class="mb-4">
                <div class="flex gap-2 mb-2 justify-center">`;
            for (let i = 0; i < 5; i++) {
                const card = duel.playerField[i];
                html += `<div class="card-slot ${card ? 'occupied' : ''}">${card ? (card.faceDown ? '🂠' : card.name?.substring(0,8)) : ''}</div>`;
            }
            html += `</div>
                <div class="flex justify-between items-center mb-1"><p class="font-bold">👤 You</p><p class="text-sm">❤️ ${duel.playerHP}</p></div>
                <div class="h-5 bg-gray-700 rounded-full"><div class="hp-bar ${hpColor(duel.playerHP)}" style="width:${hpBarWidth(duel.playerHP)}%"></div></div>
            </div>

            <!-- Hand -->
            <div class="mb-4"><p class="text-sm text-gray-400 mb-1">🃏 Hand (${duel.playerHand?.length||0})</p><div class="flex gap-2 flex-wrap">`;
            if (duel.playerHand) {
                duel.playerHand.forEach((c, i) => {
                    html += `<div class="card-slot occupied text-xs">${c.name?.substring(0,8)}<br>ATK:${c.attack}</div>`;
                });
            }
            html += `</div></div>`;

            // Controls
            if (duel.isMyTurn) {
                html += `<div class="flex gap-2 justify-center flex-wrap mt-4">`;
                if (duel.phase === 'draw') {
                    html += `<button onclick="duelAction('draw')" class="btn btn-blue">📥 Draw</button>`;
                }
                html += `<button onclick="duelAction('summon')" class="btn btn-gold">⚔️ Summon</button>
                    <button onclick="duelAction('attack')" class="btn btn-red">💥 Attack</button>
                    <button onclick="duelAction('set')" class="btn btn-blue">🛡️ Set</button>
                    <button onclick="duelAction('endturn')" class="btn btn-green">🏁 End Turn</button>
                </div>`;
            }
            html += `<div class="text-center mt-4"><button onclick="duelAction('surrender')" class="btn btn-red text-sm">🏳️ Surrender</button></div>`;

            container.innerHTML = html;
        }

        async function duelAction(action) {
            let body = {};
            if (action === 'summon') {
                const slot = prompt('Hand slot (1-7):');
                if (!slot) return;
                const pos = prompt('Position (atk/def):', 'atk');
                body = { handSlot: parseInt(slot) - 1, position: pos };
            } else if (action === 'attack') {
                const slot = prompt('Your field slot (1-5):');
                if (!slot) return;
                const target = prompt('Target slot (1-5) or leave blank for direct:');
                body = { fieldSlot: parseInt(slot) - 1, targetSlot: target ? parseInt(target) - 1 : undefined };
            } else if (action === 'set') {
                const slot = prompt('Hand slot (1-7):');
                if (!slot) return;
                body = { handSlot: parseInt(slot) - 1 };
            }

            const endpoints = { draw: '/duel/draw', summon: '/duel/summon', attack: '/duel/attack', set: '/duel/set', endturn: '/duel/endturn', surrender: '/duel/surrender' };
            const res = await apiFetch(endpoints[action], { method: 'POST', body: JSON.stringify(body) });
            
            if (res?.success) {
                if (res.result?.gameOver) { alert('🏆 You won!'); }
                await pollDuel();
            } else {
                alert(res?.error || 'Action failed');
            }
        }

        window.addEventListener('beforeunload', () => { if (duelPollInterval) clearInterval(duelPollInterval); });
    </script>
</body>
</html>
