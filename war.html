<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guild Wars - SABAODY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pirata+One&display=swap" rel="stylesheet">
    <style>
        .pirate { font-family: 'Pirata One', cursive; }
        body { background: #0b0e1e; color: #e2e8f0; }
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .tab-btn { padding: 0.5rem 1rem; border-radius: 0.5rem; cursor: pointer; }
        .tab-active { background: #f59e0b; color: black; font-weight: bold; }
    </style>
</head>
<body class="min-h-screen p-6">
    <nav class="glass rounded-2xl p-4 mb-8 flex justify-between items-center">
        <h1 class="text-3xl pirate gold-text">⚓ SABAODY</h1>
        <div class="space-x-4">
            <a href="profile.html" class="text-gray-300 hover:text-yellow-400">Profile</a>
            <a href="cards.html" class="text-gray-300 hover:text-yellow-400">Cards</a>
            <a href="store.html" class="text-gray-300 hover:text-yellow-400">Store</a>
            <a href="leaderboard.html" class="text-gray-300 hover:text-yellow-400">Leaderboard</a>
            <a href="war.html" class="text-yellow-400 font-semibold">Guild Wars</a>
            <button onclick="logout()" class="bg-red-500 px-4 py-2 rounded-xl text-white">Logout</button>
        </div>
    </nav>

    <div class="glass rounded-2xl p-6">
        <div class="flex space-x-4 mb-6">
            <button onclick="switchWarTab('active')" class="tab-btn tab-active" id="tab-active">⚔️ Active Wars</button>
            <button onclick="switchWarTab('create')" class="tab-btn" id="tab-create">🆕 Create War</button>
        </div>
        <div id="war-content"></div>
    </div>

    <script src="app.js"></script>
    <script>
        let currentWarTab = 'active';
        function switchWarTab(tab) {
            currentWarTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active'));
            document.getElementById('tab-' + tab).classList.add('tab-active');
            loadWarContent();
        }
        async function loadWarContent() {
            const container = document.getElementById('war-content');
            if (currentWarTab === 'active') {
                await loadActiveWars(container);
            } else if (currentWarTab === 'create') {
                showCreateForm(container);
            }
        }
        document.addEventListener('DOMContentLoaded', () => {
            if (!localStorage.getItem('sabaody_token')) window.location = 'index.html';
            loadWarContent();
        });
    </script>
</body>
</html>
